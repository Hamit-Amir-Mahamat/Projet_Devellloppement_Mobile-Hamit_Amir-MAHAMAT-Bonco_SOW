<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestion des Contacts</title>
    
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
    <link rel="stylesheet" href="css/index.css">

    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>

    <div data-role="page" id="home-page">
        <div data-role="header" data-theme="b">
            <h1>Mes Contacts</h1>
            <a href="#add-page" class="ui-btn ui-btn-right ui-icon-plus ui-btn-icon-notext ui-corner-all">Ajouter</a>
        </div>

        <div data-role="main" class="ui-content">
            <ul id="contactList" data-role="listview" data-inset="true" data-filter="true" data-filter-placeholder="Rechercher un contact..." data-split-icon="delete" data-split-theme="a">
                </ul>
        </div>
    </div>

    <div data-role="page" id="add-page">
        <div data-role="header" data-theme="b">
            <a href="#home-page" class="ui-btn ui-icon-carat-l ui-btn-icon-notext ui-corner-all">Retour</a>
            <h1>Nouveau Contact</h1>
        </div>

        <div data-role="main" class="ui-content">
            <div class="form-card">
                <label for="contactName">Nom complet :</label>
                <input type="text" id="contactName" placeholder="Ex: Mouhamed Diop" data-clear-btn="true">

                <label for="contactPhone">Téléphone :</label>
                <input type="tel" id="contactPhone" placeholder="Ex: 78 315 45 57 " data-clear-btn="true">

                <label for="contactEmail">Email :</label>
                <input type="email" id="contactEmail" placeholder="Ex: mouhameddiop@email.com" data-clear-btn="true">

                <button id="saveContactBtn" class="ui-btn ui-btn-b ui-corner-all ui-shadow" style="margin-top: 20px;">Enregistrer</button>
            </div>
        </div>
            </div>
                <div data-role="footer" data-position="fixed" data-theme="b">
                    <h4>&copy; M2 SRT - 2026</h4>
                </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
